<!DOCTYPE html>
<html>
<head>
  <title>Random Video Chat</title>
  <style>
    video {
      width: 45%;
      border: 2px solid black;
      margin: 5px;
    }
  </style>
</head>
<body>

<h2>🎥 Random Video Chat</h2>

<input id="interests" placeholder="coding,music" />
<button onclick="start()">Start</button>
<button onclick="nextUser()">Next</button>

<br><br>

<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io("https://your-backend.onrender.com"); // 🔥 CHANGE THIS

let localStream;
let peer;
let partnerId;

// 🎥 Start
async function start() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
  } catch (err) {
    alert("Camera/Mic error: " + err.message);
    return;
  }

  document.getElementById("localVideo").srcObject = localStream;

  const interests = document
    .getElementById("interests")
    .value.split(",")
    .map(i => i.trim().toLowerCase())
    .filter(Boolean);

  socket.emit("joinQueue", { interests });
}

// 🔗 Matched
socket.on("matched", (id) => {
  partnerId = id;
  createPeer(true);
});

// 📥 Offer
socket.on("offer", async (data) => {
  partnerId = data.from;
  createPeer(false);

  await peer.setRemoteDescription(data.offer);

  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);

  socket.emit("answer", { to: partnerId, answer });
});

// 📥 Answer
socket.on("answer", async (data) => {
  await peer.setRemoteDescription(data.answer);
});

// ❄ ICE
socket.on("ice-candidate", async (data) => {
  if (peer) {
    await peer.addIceCandidate(data.candidate);
  }
});

// ❌ Partner disconnected
socket.on("partner-disconnected", () => {
  alert("Partner disconnected");
  cleanup();
});

// 🧠 Create Peer
function createPeer(isInitiator) {
  peer = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" }
    ]
  });

  peer.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit("ice-candidate", {
        to: partnerId,
        candidate: event.candidate
      });
    }
  };

  peer.ontrack = (event) => {
    document.getElementById("remoteVideo").srcObject = event.streams[0];
  };

  localStream.getTracks().forEach(track => {
    peer.addTrack(track, localStream);
  });

  if (isInitiator) {
    peer.createOffer().then(offer => {
      peer.setLocalDescription(offer);
      socket.emit("offer", { to: partnerId, offer });
    });
  }
}

// 🔁 Next
function nextUser() {
  socket.emit("next");
  cleanup();

  socket.emit("joinQueue", { interests: [] });
}

// 🧹 Cleanup
function cleanup() {
  if (peer) {
    peer.close();
    peer = null;
  }

  document.getElementById("remoteVideo").srcObject = null;
  partnerId = null;
}
</script>

</body>
</html>
