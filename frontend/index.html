<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Random Video Chat | Connect Instantly</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <!-- Video Containers -->
    <div class="video-container">
      <div class="video-wrapper partner-video" id="partnerVideoWrapper">
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
      
      <div class="video-wrapper local-video hidden" id="localVideoWrapper" onclick="window.switchCamera?.()">
        <video id="localVideo" autoplay muted playsinline></video>
      </div>
    </div>

    <!-- Controls (Hidden until call starts) -->
    <div class="controls hidden" id="controls">
      <button class="control-btn" onclick="window.toggleAudio?.()" id="audioBtn">🎤</button>
      <button class="control-btn next" onclick="window.nextUser?.()">⏭️</button>
      <button class="control-btn end" onclick="window.endCall?.()">📞</button>
    </div>

    <!-- Status Indicator -->
    <div class="status-indicator" id="statusIndicator">
      👋 Welcome! Select your interest
    </div>

    <!-- Loading Overlay (Hidden by default) -->
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loading-content">
        <div class="spinner"></div>
        <p id="loadingText">Finding your perfect match...</p>
        <button class="cancel-loading" onclick="window.cancelLoading?.()">Cancel</button>
      </div>
    </div>

    <!-- Interest Modal -->
    <div class="modal" id="interestModal">
      <div class="modal-content">
        <h2>🎯 Choose Your Interest</h2>
        <input type="text" class="interest-input" id="interestInput" placeholder="e.g., coding, music, gaming" autocomplete="off">
        
        <h3>🔥 Trending Topics</h3>
        <div class="trending-topics" id="trendingTopics">
          <div class="topic-chip" data-topic="gaming">🎮 Gaming</div>
          <div class="topic-chip" data-topic="coding">💻 Coding</div>
          <div class="topic-chip" data-topic="music">🎵 Music</div>
          <div class="topic-chip" data-topic="sports">⚽ Sports</div>
          <div class="topic-chip" data-topic="movies">🎬 Movies</div>
          <div class="topic-chip" data-topic="cricket">🏏 Cricket</div>
          <div class="topic-chip" data-topic="football">⚽ Football</div>
          <div class="topic-chip" data-topic="tech">🔧 Tech</div>
        </div>
        
        <button class="start-btn" id="startBtn">🚀 Start Video Chat</button>
        <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #999;">
          We'll match you with similar interests (60-70% match)
        </p>
      </div>
    </div>

    <!-- Analytics Dashboard (Hidden by default, triple-click to show) -->
    <div class="analytics-dashboard hidden" id="analyticsDashboard">
      <strong>📊 Session Analytics</strong>
      <div id="analyticsContent"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
