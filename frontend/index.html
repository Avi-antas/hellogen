<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hellogen - Real People, Real Conversations</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing-container {
      background: white;
      border-radius: 30px;
      padding: 50px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #666;
      margin-bottom: 40px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn:hover {
      transform: scale(1.02);
    }

    .guest-warning {
      font-size: 12px;
      color: #999;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="landing-container">
    <h1>🎥 Hellogen</h1>
    <p class="subtitle">Real People . Live Connection.</p>

    <button class="btn btn-primary" onclick="startAuth()">
      🚀 Start Chat
    </button>

    <button class="btn btn-secondary" onclick="startGuest()">
      👤 Guest Mode (5 min limit)
    </button>

    <p class="guest-warning">
      ⚡ Guest mode: 5 minutes max • Action on policy violation
    </p>
  </div>

  <script src="script.js"></script>
  <!-- Firebase SDK -->

</script>
  <script>
    function startAuth() {
      window.location.href = './auth.html';
    }

    async function startGuest() {
  const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:5000'
  : 'https://hellogen.onrender.com';
  try {
    console.log('Starting guest mode...');
    const response = await fetch(`${BACKEND_URL}/auth/guest`, { 
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    
    console.log('Response status:', response.status);
    const data = await response.json();
    console.log('Guest response:', data);
    
    if (data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('isGuest', 'true');
      localStorage.setItem('userId', data.user.id);
      window.location.href = './rules.html';
    } else {
      alert('Guest mode failed: ' + (data.message || 'Unknown error'));
    }
  } catch (err) {
    console.error('Guest mode error:', err);
    alert('Cannot connect to server. Make sure backend is running on http://localhost:5000');
  }
}
  </script>
</body>

</html>
