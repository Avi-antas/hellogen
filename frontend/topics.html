<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topics - hellogen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Krub:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Krub', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      padding: 20px;
    }
    
    /* Header with Profile Badge */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: flex-end;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(10,10,10,0.8), transparent);
    }
    
    .profile-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(10px);
      padding: 6px 18px 6px 6px;
      border-radius: 60px;
      cursor: pointer;
      border: 1px solid rgba(102, 126, 234, 0.3);
      transition: all 0.2s ease;
    }
    
    .profile-badge:hover {
      border-color: #667eea;
      transform: scale(1.02);
    }
    
    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    
    .profile-name {
      font-weight: 600;
      font-size: 14px;
      color: white;
    }
    
    /* Email Banner */
    .email-banner {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 12px 24px;
      border-radius: 60px;
      display: none;
      align-items: center;
      gap: 16px;
      z-index: 100;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.5s ease;
    }
    
    .email-banner.show { display: flex; }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-30px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    .email-banner p { color: white; font-size: 13px; font-weight: 500; }
    
    .email-banner button {
      background: white;
      border: none;
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Krub', sans-serif;
      transition: all 0.2s;
    }
    
    .email-banner button:hover { transform: scale(1.02); }
    
    .email-banner .close-banner {
      background: transparent;
      color: white;
      font-size: 18px;
      padding: 0;
      margin-left: 8px;
    }
    
    .container { max-width: 800px; margin: 0 auto; padding-top: 80px; }
    
    h2 { text-align: center; color: white; margin-bottom: 10px; font-weight: 700; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.7); margin-bottom: 30px; }
    
    .match-count-badge {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .match-count-badge span {
      background: rgba(102, 126, 234, 0.15);
      display: inline-block;
      padding: 6px 18px;
      border-radius: 50px;
      font-size: 13px;
      color: #667eea;
      font-weight: 500;
    }
    
    .topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .topic-card {
      background: #141414;
      padding: 25px 15px;
      text-align: center;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #222;
    }
    
    .topic-card:hover { 
      transform: translateY(-5px); 
      border-color: #667eea;
      background: #1a1a1a;
    }
    
    .topic-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
    .topic-name { font-size: 16px; font-weight: 600; color: white; }
    
    .custom-topic {
      background: #141414;
      border-radius: 20px;
      padding: 25px;
      margin-top: 20px;
      border: 1px solid #222;
    }
    
    .custom-topic h3 { margin-bottom: 15px; color: white; font-weight: 600; }
    
    .custom-input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .custom-input-group input {
      flex: 1;
      padding: 15px;
      background: #1f1f1f;
      border: 1px solid #2d2d2d;
      border-radius: 15px;
      font-size: 16px;
      font-family: 'Krub', sans-serif;
      color: white;
      min-width: 200px;
    }
    
    .custom-input-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .custom-input-group button {
      padding: 15px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Krub', sans-serif;
      transition: transform 0.2s;
    }
    
    .custom-input-group button:hover { transform: translateY(-2px); }
    .custom-input-group button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .warning { 
      color: #ff4757; 
      font-size: 13px; 
      margin-top: 10px; 
      padding: 10px; 
      background: rgba(255, 71, 87, 0.1); 
      border-radius: 10px; 
      display: none; 
    }
    
    .loading-topic { 
      display: none; 
      text-align: center; 
      margin-top: 10px; 
      color: #667eea; 
      font-size: 13px;
    }
    
    .spinner-small {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(102, 126, 234, 0.3);
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Edit Profile Modal */
    .edit-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(16px);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    
    .edit-modal.active { display: flex; animation: modalFade 0.3s ease; }
    
    @keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
    
    .edit-modal-content {
      background: #141414;
      border-radius: 32px;
      padding: 32px;
      width: 90%;
      max-width: 450px;
      border: 1px solid #2d2d2d;
    }
    
    .edit-modal-content h3 { color: white; font-size: 24px; font-weight: 600; margin-bottom: 24px; }
    
    .edit-avatar-section { text-align: center; margin-bottom: 24px; }
    
    .edit-avatar-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin: 0 auto 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .edit-avatar-circle:hover { transform: scale(1.05); }
    .change-avatar { color: #667eea; font-size: 12px; cursor: pointer; }
    
    .edit-emoji-picker {
      display: none;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 16px;
      padding: 12px;
      background: #1f1f1f;
      border-radius: 16px;
    }
    
    .edit-emoji-picker.show { display: grid; }
    
    .edit-emoji-option {
      font-size: 24px;
      padding: 6px;
      cursor: pointer;
      text-align: center;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .edit-emoji-option:hover { background: #2d2d2d; transform: scale(1.1); }
    
    .edit-input {
      width: 100%;
      padding: 14px 16px;
      background: #1f1f1f;
      border: 1px solid #2d2d2d;
      border-radius: 16px;
      font-size: 16px;
      font-family: 'Krub', sans-serif;
      color: white;
      margin-bottom: 20px;
    }
    
    .edit-input:focus { outline: none; border-color: #667eea; }
    
    .edit-modal-buttons { display: flex; gap: 12px; }
    
    .edit-save-btn {
      flex: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Krub', sans-serif;
    }
    
    .edit-cancel-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #2d2d2d;
      color: white;
      padding: 12px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Krub', sans-serif;
    }
    
    @media (max-width: 768px) {
      .topics-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
      .topic-card { padding: 15px 10px; }
      .topic-emoji { font-size: 30px; }
      .container { padding-top: 100px; }
    }
  </style>
</head>
<body>
  <!-- Header with Profile Badge -->
  <div class="header">
    <div class="profile-badge" id="profileBadge">
      <div class="profile-avatar" id="profileAvatar">😎</div>
      <span class="profile-name" id="profileName">Explorer</span>
    </div>
  </div>

  <!-- Email Banner -->
  <div class="email-banner" id="emailBanner">
    <p>✨ Add your email to save progress & get better matches!</p>
    <button id="addEmailBtn">Add Email</button>
    <button class="close-banner" id="closeBannerBtn">✕</button>
  </div>

  <div class="container">
    <h2>🎯 Select Your Interest</h2>
    <p class="subtitle">Choose a topic or create your own</p>
    
    <div class="match-count-badge">
      <span id="matchCountDisplay">✨ 0 matches completed</span>
    </div>

    <div class="topics-grid" id="topicsGrid"></div>

    <div class="custom-topic">
      <h3>✏️ Or create your own</h3>
      <div class="custom-input-group">
        <input type="text" id="customTopic" placeholder="Enter any topic (max 30 chars)" maxlength="30" autocomplete="off">
        <button id="startCustomBtn">Start Chat</button>
      </div>
      <div id="topicWarning" class="warning"></div>
      <div id="topicLoading" class="loading-topic">
        <div class="spinner-small"></div>
        <span>Checking topic...</span>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="edit-modal" id="editModal">
    <div class="edit-modal-content">
      <h3>Edit Profile</h3>
      <div class="edit-avatar-section">
        <div class="edit-avatar-circle" id="editAvatarCircle">😎</div>
        <div class="change-avatar" id="editChangeAvatarBtn">Change avatar</div>
        <div class="edit-emoji-picker" id="editEmojiPicker">
          <div class="edit-emoji-option">😎</div><div class="edit-emoji-option">🦊</div>
          <div class="edit-emoji-option">🐱</div><div class="edit-emoji-option">👾</div>
          <div class="edit-emoji-option">🚀</div><div class="edit-emoji-option">🌟</div>
          <div class="edit-emoji-option">🔥</div><div class="edit-emoji-option">💀</div>
          <div class="edit-emoji-option">👻</div><div class="edit-emoji-option">🤖</div>
          <div class="edit-emoji-option">🐉</div><div class="edit-emoji-option">🍕</div>
          <div class="edit-emoji-option">⚡</div><div class="edit-emoji-option">💎</div>
        </div>
      </div>
      <input type="text" class="edit-input" id="editNameInput" placeholder="Your name" maxlength="20">
      <input type="email" class="edit-input" id="editEmailInput" placeholder="Email (optional)">
      <div class="edit-modal-buttons">
        <button class="edit-cancel-btn" id="editCancelBtn">Cancel</button>
        <button class="edit-save-btn" id="editSaveBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : 'https://hellogen.onrender.com';

    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    // ============================================
    // COMPREHENSIVE PROFANITY LIST (Same as backend)
    // ============================================
    const offensiveWords = [
      'fuck', 'shit', 'asshole', 'bitch', 'cunt', 'dick', 'pussy', 'cock', 
      'whore', 'slut', 'bastard', 'motherfucker', 'faggot', 'nigger', 
      'nigga', 'retard', 'moron', 'idiot', 'dumb', 'stupid', 'ass', 'damn',
      'fuk', 'fcuk', 'fcker', 'bsdk', 'fck', 'fuker', 'gand', 'gandu', 
      'chutiya', 'bhenchod', 'madarchod', 'bhosdike', 'lodu', 'randi', 
      'harami', 'kamine', 'saala', 'hijra', 'chakka', 'bevakoof', 'nalayak',
      'bhadva', 'chodu', 'lavde', 'bhencho', 'bhosdi', 'maderchod', 'mc', 'bc',
      'teri maa', 'maa ki', 'bahanchod', 'bahan ke', 'chut', 'chut marunga', 
      'bhosri', 'chutad', 'lauda', 'lund', 'pundai', 'thevdiya', 'ghatiya', 
      'ullu ka patha', 'hijda', 'khanki', 'bokachoda', 'chodna', 'magi', 
      'magir pola', 'kuttar bachcha', 'kutta', 'kukur', 'shaal', 'gud', 
      'putki', 'boka', 'chele', 'paka', 'nati', 'kharap', 'baje', 'mosla', 
      'gaye', 'garda', 'khepa', 'choda', 'mutha', 'haraam', 'bhai er maa',
      'tor maa', 'tor baper', 'kuttar baccha', 'magir pola', 'kill', 'murder', 
      'death', 'suicide', 'hang', 'shoot', 'bomb', 'attack', 'violence', 'blood', 
      'rape', 'abuse', 'hitler', 'nazi', 'terrorist', 'beheading', 'slaughter', 
      'torture', 'sex', 'porn', 'xxx', 'nude', 'naked', 'erotic', 'fucking',
      'blowjob', 'handjob', 'orgasm', 'penis', 'vagina', 'boobs', 'tits',
      'breasts', 'nipple', 'anal', 'oral', 'cum', 'semen', 'masturbate'
    ];

    // Popular topics
    const topics = [
      { emoji: "💻", name: "Coding", value: "coding" },
      { emoji: "🏏", name: "Cricket", value: "cricket" },
      { emoji: "🎮", name: "Gaming", value: "gaming" },
      { emoji: "🎵", name: "Music", value: "music" },
      { emoji: "⚽", name: "Football", value: "football" },
      { emoji: "🎬", name: "Movies", value: "movies" },
      { emoji: "🤖", name: "AI/ML", value: "artificial intelligence" },
      { emoji: "📚", name: "Study", value: "study" },
      { emoji: "💼", name: "Startups", value: "startups" },
      { emoji: "🎭", name: "Open Mic", value: "open mic" },
      { emoji: "🎨", name: "Art", value: "art" },
      { emoji: "✈️", name: "Travel", value: "travel" }
    ];

    // ============================================
    // USER PROFILE MANAGEMENT
    // ============================================
    const isGuest = localStorage.getItem('isGuest') === 'true';
    let userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
    let matchCount = parseInt(localStorage.getItem('matchCount') || '0');
    let currentAvatar = userProfile.avatar || '😎';
    let currentName = userProfile.name || 'Explorer';
    let currentEmail = userProfile.email || null;

    // Update UI with profile
    document.getElementById('profileAvatar').textContent = currentAvatar;
    document.getElementById('profileName').textContent = currentName;
    document.getElementById('matchCountDisplay').innerHTML = `✨ ${matchCount} ${matchCount === 1 ? 'match' : 'matches'} completed`;

    // ============================================
    // MATCH COUNT & EMAIL BANNER
    // ============================================
    function checkAndShowEmailBanner() {
      const banner = document.getElementById('emailBanner');
      const hasEmail = currentEmail && currentEmail.length > 0;
      
      if (matchCount >= 2 && isGuest && !hasEmail && !sessionStorage.getItem('emailBannerDismissed')) {
        banner.classList.add('show');
      }
    }

    // If coming back from chat, increment match count
    if (sessionStorage.getItem('matchJustCompleted')) {
      matchCount++;
      localStorage.setItem('matchCount', matchCount);
      document.getElementById('matchCountDisplay').innerHTML = `✨ ${matchCount} ${matchCount === 1 ? 'match' : 'matches'} completed`;
      sessionStorage.removeItem('matchJustCompleted');
      checkAndShowEmailBanner();
    }

    checkAndShowEmailBanner();

    // ============================================
    // EDIT PROFILE MODAL
    // ============================================
    let editSelectedEmoji = currentAvatar;
    
    function openEditModal() {
      document.getElementById('editAvatarCircle').textContent = currentAvatar;
      document.getElementById('editNameInput').value = currentName;
      document.getElementById('editEmailInput').value = currentEmail || '';
      document.getElementById('editModal').classList.add('active');
      editSelectedEmoji = currentAvatar;
    }
    
    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      document.getElementById('editEmojiPicker').classList.remove('show');
    }
    
    function saveEditProfile() {
      const newName = document.getElementById('editNameInput').value.trim() || 'Explorer';
      const newEmail = document.getElementById('editEmailInput').value.trim() || null;
      
      currentName = newName;
      currentAvatar = editSelectedEmoji;
      currentEmail = newEmail;
      
      userProfile = { name: newName, avatar: editSelectedEmoji, email: newEmail, isGuest: isGuest };
      localStorage.setItem('userProfile', JSON.stringify(userProfile));
      
      document.getElementById('profileAvatar').textContent = currentAvatar;
      document.getElementById('profileName').textContent = currentName;
      
      if (newEmail) {
        document.getElementById('emailBanner').classList.remove('show');
      }
      
      // Save to backend
      fetch(`${BACKEND_URL}/api/guest/track`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName, avatar: currentAvatar, email: newEmail })
      }).catch(() => {});
      
      closeEditModal();
    }
    
    document.getElementById('profileBadge').addEventListener('click', openEditModal);
    document.getElementById('editCancelBtn').addEventListener('click', closeEditModal);
    document.getElementById('editSaveBtn').addEventListener('click', saveEditProfile);
    
    document.getElementById('editChangeAvatarBtn').addEventListener('click', () => {
      document.getElementById('editEmojiPicker').classList.toggle('show');
    });
    
    document.querySelectorAll('.edit-emoji-option').forEach(emoji => {
      emoji.addEventListener('click', (e) => {
        e.stopPropagation();
        editSelectedEmoji = emoji.textContent;
        document.getElementById('editAvatarCircle').textContent = editSelectedEmoji;
        document.getElementById('editEmojiPicker').classList.remove('show');
      });
    });
    
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.edit-avatar-section')) {
        document.getElementById('editEmojiPicker').classList.remove('show');
      }
      if (e.target === document.getElementById('editModal')) closeEditModal();
    });
    
    // Email banner handlers
    document.getElementById('addEmailBtn').addEventListener('click', () => {
      openEditModal();
    });
    
    document.getElementById('closeBannerBtn').addEventListener('click', () => {
      document.getElementById('emailBanner').classList.remove('show');
      sessionStorage.setItem('emailBannerDismissed', 'true');
    });

    // ============================================
    // PROFANITY CHECK FUNCTION
    // ============================================
    function containsProfanity(text) {
      const lowerText = text.toLowerCase();
      for (const word of offensiveWords) {
        if (lowerText.includes(word)) {
          console.log(`🚫 Blocked word found: "${word}" in "${text}"`);
          return true;
        }
      }
      return false;
    }

    function getOffensiveWord(text) {
      const lowerText = text.toLowerCase();
      for (const word of offensiveWords) {
        if (lowerText.includes(word)) return word;
      }
      return null;
    }

    // ============================================
    // SELECT TOPIC FUNCTION
    // ============================================
    async function selectTopic(topic, topicName) {
      const warningDiv = document.getElementById('topicWarning');
      warningDiv.style.display = 'none';
      
      if (containsProfanity(topic)) {
        const badWord = getOffensiveWord(topic);
        warningDiv.innerHTML = `❌ Topic contains offensive word: "${badWord}". Please choose a different topic.`;
        warningDiv.style.display = 'block';
        return;
      }
      
      localStorage.setItem('selectedTopic', topic);
      localStorage.setItem('selectedTopicName', topicName || topic);
      window.location.href = 'chat.html';
    }

    // Render topics grid
    const grid = document.getElementById('topicsGrid');
    topics.forEach(topic => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      card.onclick = () => selectTopic(topic.value, topic.name);
      card.innerHTML = `
        <span class="topic-emoji">${topic.emoji}</span>
        <div class="topic-name">${topic.name}</div>
      `;
      grid.appendChild(card);
    });

    // ============================================
    // CUSTOM TOPIC FUNCTION
    // ============================================
    const customInput = document.getElementById('customTopic');
    const startBtn = document.getElementById('startCustomBtn');
    const warningDiv = document.getElementById('topicWarning');
    const loadingDiv = document.getElementById('topicLoading');

    async function startWithCustomTopic() {
      const custom = customInput.value.trim().toLowerCase();
      
      warningDiv.style.display = 'none';
      
      if (!custom) {
        warningDiv.innerHTML = 'Please enter a topic';
        warningDiv.style.display = 'block';
        return;
      }
      
      if (custom.length > 30) {
        warningDiv.innerHTML = 'Topic too long (max 30 characters)';
        warningDiv.style.display = 'block';
        return;
      }
      
      const allowedRegex = /^[a-zA-Z0-9\s\-_]+$/;
      if (!allowedRegex.test(custom)) {
        warningDiv.innerHTML = 'Topic can only contain letters, numbers, spaces, hyphens, and underscores';
        warningDiv.style.display = 'block';
        return;
      }
      
      if (containsProfanity(custom)) {
        const badWord = getOffensiveWord(custom);
        warningDiv.innerHTML = `❌ Topic contains offensive word: "${badWord}". Please enter a different topic.`;
        warningDiv.style.display = 'block';
        customInput.value = '';
        return;
      }
      
      if (offensiveWords.includes(custom)) {
        warningDiv.innerHTML = `❌ Offensive word "${custom}" is not allowed as a topic.`;
        warningDiv.style.display = 'block';
        customInput.value = '';
        return;
      }
      
      localStorage.setItem('selectedTopic', custom);
      localStorage.setItem('selectedTopicName', custom);
      window.location.href = 'chat.html';
    }

    startBtn.addEventListener('click', startWithCustomTopic);
    customInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') startWithCustomTopic();
    });
  </script>
</body>
</html>
