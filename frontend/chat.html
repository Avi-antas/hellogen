<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hellogen - Live Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Krub:wght@400;500;600;700&display=swap');

    /* ============================================
       RESET & BASE STYLES
    ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Krub', sans-serif;
      background: #0a0a0a;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    /* ============================================
       VIDEO CONTAINERS
    ============================================ */
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .video-wrapper {
      position: absolute;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: #000;
      overflow: hidden;
    }

    .video-wrapper.partner-video {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .video-wrapper.local-video {
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 160px;
      z-index: 2;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .video-wrapper.local-video:hover {
      border-color: #667eea;
      transform: scale(1.02);
    }

    .video-wrapper.local-fullscreen {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideo {
      transform: rotateY(180deg);
    }

    /* ============================================
       CONTROLS
    ============================================ */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      gap: 30px;
      z-index: 10;
      padding: 12px 24px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 60px;
      width: auto;
    }

    .control-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .control-btn:hover {
      transform: scale(1.05);
    }

    .control-btn.end {
      background: #ff4757;
    }

    .control-btn.end:hover {
      background: #ff0000;
      box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
    }

    .control-btn.mute {
      background: rgba(46, 213, 115, 0.8);
    }

    .control-btn.mute:hover {
      background: #2ed573;
    }

    /* ============================================
       STATUS INDICATOR
    ============================================ */
    .status-indicator {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 30px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      z-index: 15;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      pointer-events: none;
    }

    .status-indicator.show {
      opacity: 1;
      visibility: visible;
    }

    /* ============================================
       TOPIC BADGE
    ============================================ */
    .topic-badge {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(102, 126, 234, 0.95);
      backdrop-filter: blur(10px);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      z-index: 15;
      display: none;
      gap: 8px;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
    }

    .topic-badge.visible {
      display: flex;
      animation: slideDown 0.4s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ============================================
       TIMER
    ============================================ */
    .timer {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      color: white;
      font-size: 13px;
      font-family: monospace;
      z-index: 15;
      font-weight: 500;
    }

    .timer.hidden {
      display: none;
    }

    .timer.warning {
      background: #ff4757;
      animation: timerWarning 1s infinite;
    }

    @keyframes timerWarning {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    /* ============================================
       RED FLAG BUTTON
    ============================================ */
    .red-flag-btn {
      position: fixed;
      bottom: 120px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff4757, #ff0000);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 26px;
      z-index: 15;
      box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .red-flag-btn.visible {
      display: flex;
      animation: flagPulse 1.5s infinite;
    }

    .red-flag-btn:hover {
      transform: scale(1.1);
    }

    @keyframes flagPulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
      }

      50% {
        transform: scale(1.08);
        box-shadow: 0 0 0 15px rgba(255, 71, 87, 0);
      }
    }

    /* ============================================
       PIN BUTTON - FIXED POSITION
    ============================================ */
    .pin-btn {
      position: fixed;
      bottom: 120px;
      right: 90px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      z-index: 15;
      box-shadow: 0 0 15px rgba(243, 156, 18, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .pin-btn.visible {
      display: flex;
    }

    .pin-btn:hover {
      transform: scale(1.1);
      background: linear-gradient(135deg, #e67e22, #d35400);
    }

    .pin-btn.pinned {
      background: linear-gradient(135deg, #2ed573, #26a65b);
    }

    .pin-toast {
      position: fixed;
      bottom: 200px;
      right: 20px;
      background: rgba(46, 213, 115, 0.95);
      color: white;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 12px;
      z-index: 1000;
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* ============================================
       SCROLL HINT
    ============================================ */
    .scroll-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      z-index: 15;
      pointer-events: none;
      animation: bounceHint 2s ease infinite;
      white-space: nowrap;
    }

    @keyframes bounceHint {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
        opacity: 0.7;
      }

      50% {
        transform: translateX(-50%) translateY(-8px);
        opacity: 1;
      }
    }

    /* ============================================
       VIOLATION COUNTER
    ============================================ */
    .violation-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 5px 12px;
      border-radius: 20px;
      color: #ffa502;
      font-size: 11px;
      font-weight: 500;
      z-index: 15;
      font-family: monospace;
    }

    /* ============================================
       MODERATION WARNING
    ============================================ */
    .moderation-warning {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      z-index: 1000;
      animation: warningSlide 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    @keyframes warningSlide {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ============================================
       MATCH OVERLAY
    ============================================ */
    .match-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 10, 0.98);
      backdrop-filter: blur(24px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .match-overlay.hide {
      opacity: 0;
      visibility: hidden;
    }

    .match-container {
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    .searching-topic {
      margin-bottom: 40px;
    }

    .searching-label {
      font-size: 14px;
      color: #a3a3a3;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .topic-pill {
      display: inline-block;
      background: rgba(102, 126, 234, 0.2);
      border: 1px solid rgba(102, 126, 234, 0.5);
      padding: 8px 24px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 600;
      color: #667eea;
      animation: topicGlow 2s infinite;
    }

    @keyframes topicGlow {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4);
      }

      50% {
        box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
      }
    }

    .avatars-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .avatar-wrapper {
      text-align: center;
    }

    .avatar-circle {
      width: 110px;
      height: 110px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      transition: all 0.4s ease;
    }

    .partner-avatar {
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      animation: avatarSearchPulse 1.8s infinite;
    }

    @keyframes avatarSearchPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.03);
        opacity: 1;
      }
    }

    .avatar-name {
      margin-top: 12px;
      font-weight: 600;
      font-size: 16px;
      color: white;
    }

    .avatar-label {
      font-size: 11px;
      color: #6b6b6b;
      margin-top: 4px;
    }

    .connection-line {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: dotPulse 1.4s infinite;
    }

    .pulse-dot.delay-1 {
      animation-delay: 0.3s;
    }

    .pulse-dot.delay-2 {
      animation-delay: 0.6s;
    }

    @keyframes dotPulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.5);
        opacity: 1;
      }
    }

    .searching-text {
      margin: 30px 0 20px;
    }

    .searching-text span {
      font-size: 16px;
      color: #a3a3a3;
    }

    .animated-dots {
      display: inline-block;
      letter-spacing: 4px;
    }

    .animated-dots span {
      animation: dotBlink 1.4s infinite;
    }

    .animated-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .animated-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dotBlink {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    .cancel-queue-btn {
      margin-top: 30px;
      padding: 12px 28px;
      background: transparent;
      border: 1.5px solid #ff4757;
      color: #ff4757;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Krub', sans-serif;
    }

    .cancel-queue-btn:hover {
      background: #ff4757;
      color: white;
      transform: translateY(-2px);
    }

    .match-overlay.matched .avatar-circle {
      animation: matchExplosion 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes matchExplosion {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.2);
      }

      100% {
        transform: scale(1);
      }
    }

    .match-overlay.matched .connection-line .pulse-dot {
      animation: successPulse 0.5s ease 3;
    }

    @keyframes successPulse {

      0%,
      100% {
        background: #667eea;
        transform: scale(1);
      }

      50% {
        background: #2ed573;
        transform: scale(1.8);
      }
    }

    .match-status {
      font-size: 28px;
      font-weight: 700;
      margin: 20px 0;
      color: #667eea;
      transition: all 0.3s;
    }

    .match-tip {
      margin-top: 30px;
      font-size: 12px;
      color: #6b6b6b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* ============================================
       REPORT MODAL
    ============================================ */
    .report-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.96);
      backdrop-filter: blur(16px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .report-modal.active {
      display: flex;
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .report-modal-content {
      background: #1a1a1a;
      padding: 28px;
      border-radius: 28px;
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid #2d2d2d;
    }

    .report-modal-content h3 {
      margin-bottom: 20px;
      color: white;
      font-size: 24px;
      font-weight: 600;
    }

    .violations-list {
      background: #0f0f0f;
      padding: 15px;
      border-radius: 16px;
      margin: 15px 0;
      font-size: 13px;
      max-height: 200px;
      overflow-y: auto;
    }

    .violation-item {
      padding: 10px;
      margin: 8px 0;
      background: rgba(255, 71, 87, 0.1);
      border-left: 3px solid #ff4757;
      border-radius: 10px;
      color: #e0e0e0;
    }

    .report-modal-content select,
    .report-modal-content textarea {
      width: 100%;
      padding: 12px 16px;
      margin: 10px 0;
      background: #0f0f0f;
      border: 1px solid #2d2d2d;
      border-radius: 14px;
      font-size: 14px;
      font-family: 'Krub', sans-serif;
      color: white;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Krub', sans-serif;
    }

    .btn-submit {
      background: #28a745;
      color: white;
    }

    .btn-cancel {
      background: #6c757d;
      color: white;
    }

    @media (max-width: 768px) {
      .control-btn {
        width: 48px;
        height: 48px;
        font-size: 20px;
      }

      .controls {
        gap: 20px;
        padding: 10px 20px;
      }

      .avatar-circle {
        width: 75px;
        height: 75px;
        font-size: 38px;
      }

      .avatars-container {
        gap: 20px;
      }

      .topic-pill {
        font-size: 14px;
        padding: 6px 18px;
      }

      .match-status {
        font-size: 22px;
      }

      .topic-badge {
        font-size: 11px;
        padding: 6px 14px;
      }

      .status-indicator {
        font-size: 11px;
        padding: 6px 14px;
      }

      .pin-btn {
        bottom: 190px;
        right: 65px;
        width: 48px;
        height: 48px;
        font-size: 20px;
      }

      .red-flag-btn {
        bottom: 190px;
        right: 15px;
        width: 48px;
        height: 48px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="video-container">
    <div class="video-wrapper partner-video" id="partnerVideoWrapper">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="video-wrapper local-fullscreen" id="localVideoWrapper">
      <video id="localVideo" autoplay muted playsinline></video>
    </div>
  </div>

  <div class="controls">
    <button class="control-btn mute" id="muteBtn">🎤</button>
    <button class="control-btn end" id="endBtn">📞</button>
  </div>

  <button class="red-flag-btn" id="redFlagBtn">🚩</button>
  <button class="pin-btn" id="pinBtn">📌</button>

  <div class="status-indicator" id="statusIndicator">Connecting...</div>
  <div class="timer hidden" id="timer"></div>
  <div class="topic-badge" id="topicBadge">
    <span id="topicEmoji">🎮</span>
    <span id="topicName">Gaming</span>
  </div>
  <div class="violation-counter" id="violationCounter">🎯 0 violations</div>

  <!-- Report Modal -->
  <div class="report-modal" id="reportModal">
    <div class="report-modal-content">
      <h3>🚨 Report Violation</h3>
      <div class="violations-list" id="violationsList"></div>
      <select id="violationType">
        <option value="harassment">Harassment / Bullying</option>
        <option value="inappropriate">Inappropriate Content</option>
        <option value="hate_speech">Hate Speech</option>
        <option value="spam">Spam / Scam</option>
        <option value="other">Other</option>
      </select>
      <textarea id="violationDesc" placeholder="Describe what happened..."></textarea>
      <div class="modal-buttons">
        <button class="btn-submit" id="submitReportBtn">✅ Submit Report</button>
        <button class="btn-cancel" id="closeModalBtn">❌ Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : 'https://hellogen.onrender.com';
    const token = localStorage.getItem('token');
    const isGuest = localStorage.getItem('isGuest') === 'true';
    const selectedTopic = localStorage.getItem('selectedTopic');
    const selectedTopicName = localStorage.getItem('selectedTopicName') || selectedTopic || 'Gaming';

    const topicEmojis = {
      'gaming': '🎮', 'music': '🎵', 'casual': '💬', 'movies': '🎬', 'tech': '💻', 'sports': '⚽', 'cricket': '🏏', 'coding': '💻', 'football': '⚽'
    };
    const topicEmoji = topicEmojis[selectedTopic] || '🎯';

    const userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
    const myAvatar = userProfile.avatar || '😎';
    const myName = userProfile.name || 'You';

    console.log('Chat started - Topic:', selectedTopicName, 'User:', myName);

    // Global variables
    let localStream = null;
    let peer = null;
    let partnerId = null;
    let mySocketId = null;
    let socket = null;
    let guestTimerInterval = null;
    let matchCountIncremented = false;
    let pendingIceCandidates = [];
    let isSwitchingPartner = false;
    let statusTimeout = null;
    let currentPartnerName = '';
    let currentPartnerAvatar = '';

    // Moderation
    let violationCount = 0;
    let violationsList = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let handsDetector = null;
    let gestureMonitoringActive = false;
    let audioMonitoringActive = false;
    let redFlagShown = false;

    // Overlay
    let matchOverlayElement = null;
    let scrollToSkipActive = false;

    // ============================================
    // ROUTE PROTECTION
    // ============================================
    if (!token) {
      alert('Please login first');
      window.location.href = './index.html';
    }

    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    function updateStatus(message, isError = false) {
      const statusDiv = document.getElementById('statusIndicator');
      statusDiv.textContent = message;
      statusDiv.classList.add('show');

      if (statusTimeout) {
        clearTimeout(statusTimeout);
      }

      const duration = isError ? 3000 : 2000;
      statusTimeout = setTimeout(() => {
        statusDiv.classList.remove('show');
      }, duration);

      console.log(`📡 ${message}`);
    }

    function updateViolationCounter() {
      const counter = document.getElementById('violationCounter');
      counter.textContent = violationCount === 0 ? '🎯 0 violations' : `🚨 ${violationCount} violation${violationCount > 1 ? 's' : ''}`;

    // ============================================
    // SCROLL TO SKIP HANDLER
    // ============================================
    function initScrollToSkip() {
      const videoElement = document.getElementById('remoteVideo');
      if (!videoElement || scrollToSkipActive) return;

      let touchStartY = null;
      const scrollThreshold = 50;
      let isSkipping = false;

      const handleWheel = (e) => {
        if (isSkipping) return;
        if (e.deltaY > scrollThreshold) {
          e.preventDefault();
          isSkipping = true;
          triggerSkip();
          setTimeout(() => { isSkipping = false; }, 2000);
        }
      };

      const handleTouchStart = (e) => {
        touchStartY = e.touches[0].clientY;
      };

      const handleTouchEnd = (e) => {
        if (isSkipping) return;
        if (!touchStartY) return;
        const swipeDistance = touchStartY - e.changedTouches[0].clientY;
        if (swipeDistance > scrollThreshold) {
          e.preventDefault();
          isSkipping = true;
          triggerSkip();
          setTimeout(() => { isSkipping = false; }, 2000);
        }
        touchStartY = null;
      };

      const triggerSkip = () => {
        if (!partnerId) {
          console.log('⚠️ No active partner, cannot skip');
          return;
        }
        console.log('🔄 Scroll/skip triggered');
        nextUser();
      };

      videoElement.addEventListener('wheel', handleWheel, { passive: false });
      videoElement.addEventListener('touchstart', handleTouchStart);
      videoElement.addEventListener('touchend', handleTouchEnd);

      scrollToSkipActive = true;
      showScrollHint();
      console.log('✅ Scroll to skip active');

      window.cleanupScrollToSkip = () => {
        videoElement.removeEventListener('wheel', handleWheel);
        videoElement.removeEventListener('touchstart', handleTouchStart);
        videoElement.removeEventListener('touchend', handleTouchEnd);
        scrollToSkipActive = false;
        isSkipping = false;
      };
    }

    // ============================================
    // PEER CONNECTION
    // ============================================
    function createPeer(isInitiator) {
      if (peer) {
        peer.close();
        peer = null;
      }

      pendingIceCandidates = [];

      const configuration = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "stun:stun2.l.google.com:19302" }
        ]
      };

      peer = new RTCPeerConnection(configuration);

      peer.onicecandidate = (event) => {
        if (event.candidate && partnerId && socket) {
          console.log('❄️ Sending ICE candidate');
          socket.emit("ice-candidate", { to: partnerId, candidate: event.candidate });
        }
      };

      peer.ontrack = (event) => {
        console.log('📡 Remote stream received');
        const remoteVideo = document.getElementById("remoteVideo");
        if (remoteVideo) {
          remoteVideo.srcObject = event.streams[0];
        }
      };

      peer.onconnectionstatechange = () => {
        console.log('🔗 Connection state:', peer.connectionState);
        if (peer.connectionState === 'connected') {
          updateStatus('Connected!', false);
        } else if (peer.connectionState === 'failed') {
          console.log('❌ Peer connection failed');
          cleanup();
          resetToWaiting();
        }
      };

      if (localStream) {
        localStream.getTracks().forEach(track => {
          peer.addTrack(track, localStream);
        });
      }

      if (isInitiator) {
        peer.createOffer()
          .then(offer => peer.setLocalDescription(offer))
          .then(() => {
            console.log('📤 Sending offer');
            socket.emit("offer", { to: partnerId, offer: peer.localDescription });
          })
          .catch(err => console.error("Offer error:", err));
      }
    }

      violationsList.push({

        type: violation.type,
        gesture: violation.gesture,
        detected: violation.detected,
        severity: violation.severity || 3,
        timestamp: new Date().toISOString()
      });

      updateViolationCounter();
      console.log(`🚨 Violation #${violationCount}:`, violation);

      let message = '';
      let color = '#ffa502';

      if (violation.type === 'audio_slang') {
        message = `⚠️ Inappropriate language detected`;
        color = '#ffa502';
      } else if (violation.type === 'offensive_gesture') {
        message = `🚫 Offensive gesture detected: ${violation.gesture}`;
        color = '#ff4757';
      }

      if (!redFlagShown) {
        document.getElementById('redFlagBtn').classList.add('visible');
        redFlagShown = true;
        showModerationWarning('🚩 Red flag available - Click to report', '#ff4757');
      }

      showModerationWarning(message, color);

      if (socket && partnerId) {
        socket.emit('moderation-violation', { to: partnerId, type: violation.type, violationCount });
      }
    }

    // ============================================
    // AI MODERATION (Simplified)
    // ============================================
    async function startAudioMonitoring() {
      if (audioMonitoringActive) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };
        mediaRecorder.onstop = async () => {
          if (audioChunks.length === 0) return;
          const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          audioChunks = [];
          const formData = new FormData();
          formData.append('audio', audioBlob);
          try {
            const res = await fetch(`${BACKEND_URL}/moderation/audio`, { method: 'POST', body: formData });
            if (res.ok) {
              const result = await res.json();
              if (result.isInappropriate && result.confidence > 0.6) {
                handleViolation({ type: 'audio_slang', detected: result.detected });
              }
            }
          } catch (err) { console.warn('Audio analysis failed'); }
        };
        mediaRecorder.start(5000);
        audioMonitoringActive = true;
        console.log('✅ Audio monitoring active');
      } catch (err) { console.error('Audio monitoring failed:', err); }
    }

    async function startGestureMonitoring() {
      if (gestureMonitoringActive) return;
      const videoElement = document.getElementById('remoteVideo');
      if (!videoElement) { setTimeout(startGestureMonitoring, 1000); return; }
      try {
        handsDetector = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        handsDetector.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        handsDetector.onResults((results) => {
          if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
              const indexTip = landmarks[8], middleTip = landmarks[12], ringTip = landmarks[16], pinkyTip = landmarks[20];
              const indexIP = landmarks[6], middleIP = landmarks[10], ringIP = landmarks[14], pinkyIP = landmarks[18];
              const isMiddleUp = middleTip.y < middleIP.y;
              const isIndexDown = indexTip.y > indexIP.y;
              const isRingDown = ringTip.y > ringIP.y;
              const isPinkyDown = pinkyTip.y > pinkyIP.y;
              if (isMiddleUp && isIndexDown && isRingDown && isPinkyDown) {
                handleViolation({ type: 'offensive_gesture', gesture: 'middle_finger', severity: 4 });
              }
            }
          }
        });
        const processVideo = async () => {
          if (!gestureMonitoringActive) return;
          if (videoElement && videoElement.readyState >= 2 && handsDetector) {
            try { await handsDetector.send({ image: videoElement }); } catch (err) { }
          }
          requestAnimationFrame(processVideo);
        };
        gestureMonitoringActive = true;
        processVideo();
        console.log('✅ Gesture monitoring active');
      } catch (err) { console.error('Gesture monitoring failed:', err); }
    }

    function stopAIModeration() {
      gestureMonitoringActive = false;
      audioMonitoringActive = false;
      if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
      if (handsDetector) { handsDetector.close(); handsDetector = null; }
    }

    function startAIModeration() {
      console.log('🎯 AI Moderation Active');
      startAudioMonitoring();
      startGestureMonitoring();
    }

    // ============================================
    // SOCKET & WEBRTC INIT
    // ============================================
    function initSocket() {
      socket = io(BACKEND_URL, {
        transports: ['websocket', 'polling'],
        auth: { token },
        reconnection: true
      });

      socket.on('connect', () => {
        mySocketId = socket.id;
        console.log('✅ Connected to backend with ID:', mySocketId);
        updateStatus('Finding your match...', false);
        startCamera();
      });

      socket.on('connect_error', (error) => {
        console.error('Connection error:', error);
        updateStatus('Connection failed', true);
      });

      socket.on('offer', async (data) => {
        console.log('📥 Received offer from:', data.from);
        partnerId = data.from;
        isMatched = true;

        const partnerAvatar = data.partnerInfo?.avatar || '🦊';
        const partnerName = data.partnerInfo?.name || 'Partner';

        await animateMatchFound(partnerAvatar, partnerName);

        updateStatus('Connecting...', false);

        document.getElementById('localVideoWrapper').classList.remove('local-fullscreen');
        document.getElementById('localVideoWrapper').classList.add('local-video');

        const remoteVideo = document.getElementById('remoteVideo');
        if (remoteVideo && remoteVideo.srcObject) {
          const tracks = remoteVideo.srcObject.getTracks();
          tracks.forEach(track => track.stop());
          remoteVideo.srcObject = null;
        }

        createPeer(false);

        await new Promise(resolve => setTimeout(resolve, 100));

        try {
          await peer.setRemoteDescription(data.offer);
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          socket.emit("answer", { to: partnerId, answer, partnerInfo: { avatar: myAvatar, name: myName } });

          if (pendingIceCandidates.length > 0) {
            for (const candidate of pendingIceCandidates) {
              try { await peer.addIceCandidate(candidate); } catch (err) { }
            }
            pendingIceCandidates = [];
          }
        } catch (err) {
          console.error('Offer error:', err);
        }

        setTimeout(() => initScrollToSkip(), 2000);
      });

      socket.on('answer', async (data) => {
        console.log('📥 Received answer');
        if (peer && peer.signalingState === 'have-local-offer') {
          try {
            await peer.setRemoteDescription(data.answer);
            if (pendingIceCandidates.length > 0) {
              for (const candidate of pendingIceCandidates) {
                try { await peer.addIceCandidate(candidate); } catch (err) { }
              }
              pendingIceCandidates = [];
            }
          } catch (err) {
            console.error('Answer error:', err);
          }
        }
      });

      socket.on('ice-candidate', async (data) => {
        if (peer && peer.remoteDescription) {
          try {
            await peer.addIceCandidate(data.candidate);
          } catch (err) { }
        } else if (peer) {
          pendingIceCandidates.push(data.candidate);
        }
      });

      socket.on('matched', async (id, topic, partnerInfo) => {
        console.log('🎯 Matched with', id, partnerInfo);
        partnerId = id;
        isMatched = true;
        incrementMatchCount();

        const partnerAvatar = partnerInfo?.avatar || '🦊';
        const partnerName = partnerInfo?.name || 'Partner';

        await animateMatchFound(partnerAvatar, partnerName);

        updateStatus('Connected!', false);

        document.getElementById('localVideoWrapper').classList.remove('local-fullscreen');
        document.getElementById('localVideoWrapper').classList.add('local-video');

        const remoteVideo = document.getElementById('remoteVideo');
        if (remoteVideo && remoteVideo.srcObject) {
          const tracks = remoteVideo.srcObject.getTracks();
          tracks.forEach(track => track.stop());
          remoteVideo.srcObject = null;
        }

        const isInitiator = mySocketId < partnerId;
        createPeer(isInitiator);
        startAIModeration();

        setTimeout(() => initScrollToSkip(), 2000);
      });

      socket.on('partner-disconnected', () => {
        console.log('Partner disconnected');
        updateStatus('Partner left. Finding new partner...', false);

        const remoteVideo = document.getElementById('remoteVideo');
        if (remoteVideo && remoteVideo.srcObject) {
          const tracks = remoteVideo.srcObject.getTracks();
          tracks.forEach(track => track.stop());
          remoteVideo.srcObject = null;
        }

        stopAIModeration();
        if (window.cleanupScrollToSkip) window.cleanupScrollToSkip();
        cleanup();
        resetToWaiting();
      });

      socket.on('show-red-flag', () => {
        if (!redFlagShown) {
          document.getElementById('redFlagBtn').classList.add('visible');
          redFlagShown = true;
          showModerationWarning('🚩 Violation reported by partner', '#ff4757');
        }
      });
    }

    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;

        createMatchOverlay();

        socket.emit("joinQueue", {
          interests: [selectedTopic],
          userId: localStorage.getItem('userId'),
          isGuest: isGuest,
          avatar: myAvatar,
          name: myName
        });

        if (isGuest) startGuestTimer();
      } catch (err) {
        alert('Camera access required');
        window.location.href = './topics.html';
      }
    }

    // ============================================
    // INIT
    // ============================================
    document.getElementById('muteBtn').onclick = toggleAudio;
    document.getElementById('endBtn').onclick = endCall;
    document.getElementById('redFlagBtn').onclick = showReportModal;
    document.getElementById('submitReportBtn').onclick = submitReport;
    document.getElementById('closeModalBtn').onclick = hideReportModal;
    document.getElementById('pinBtn').onclick = pinCurrentPartner;

    window.onclick = (e) => {
      if (e.target === document.getElementById('reportModal')) hideReportModal();
    };

    initSocket();
  </script>
</body>

</html>
