<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Live Chat - Hellogen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .video-wrapper {
      position: absolute;
      transition: all 0.5s;
      background: #000;
      overflow: hidden;
    }

    .video-wrapper.partner-video {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .video-wrapper.local-video {
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 160px;
      z-index: 2;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .video-wrapper.local-fullscreen {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transform: rotateY('180deg');
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: rotateY('180deg');
    }

    #localVideo {
      transform: rotateY(180deg);
    }

    .controls {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      margin: 0 20px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s;
    }

    .control-btn.next {
      background: #ff4757;
      color: white;
    }

    .control-btn.end {
      background: #ff0000;
      color: white;
    }

    .control-btn.mute {
      background: #2ed573;
      color: white;
    }

    .control-btn.cancel {
      background: #ffa502;
      color: white;
    }

    .status-indicator {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 25px;
      color: white;
      font-size: 14px;
      z-index: 15;
      white-space: nowrap;
    }

    .timer {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 8px 15px;
      border-radius: 20px;
      color: white;
      font-size: 14px;
      font-family: monospace;
      z-index: 15;
    }

    .timer.warning {
      background: #ff4757;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0.5;
      }
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-content {
      text-align: center;
      color: white;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .cancel-queue {
      margin-top: 20px;
      padding: 10px 20px;
      background: #ff4757;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .control-btn {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }

      .local-video {
        width: 100px;
        height: 133px;
      }
    }
  </style>
</head>

<body>
  <div class="video-container">
    <div class="video-wrapper partner-video" id="partnerVideoWrapper">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="video-wrapper local-fullscreen" id="localVideoWrapper">
      <video id="localVideo" autoplay muted playsinline></video>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="control-btn mute" id="muteBtn" onclick="toggleAudio()">🎤</button>
    <button class="control-btn next" onclick="nextUser()">⏭️</button>
    <button class="control-btn end" onclick="endCall()">📞</button>
  </div>

  <div class="status-indicator" id="statusIndicator">Connecting...</div>
  <div class="timer hidden" id="timer"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loadingText">Finding your match...</p>
      <button class="cancel-queue" onclick="cancelQueue()">Cancel & Go Back</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:5000'
  : 'https://hellogen.onrender.com';
    const token = localStorage.getItem('token');
    const isGuest = localStorage.getItem('isGuest') === 'true';
    const selectedTopic = localStorage.getItem('selectedTopic');

    console.log('Chat started - Auth:', !isGuest, 'Guest:', isGuest, 'Topic:', selectedTopic);

    if (token && !isGuest) {
      // Auth user - make sure timer is hidden
      document.getElementById('timer').classList.add('hidden');
    } else if (isGuest) {
      // Guest user - show timer
      console.log('Guest mode detected');
    } else {
      // Fallback - check token to determine if guest
      try {
        // Simple token check (you can decode JWT here)
        localStorage.setItem('isGuest', 'false');
      } catch (e) { }
    }
    // Global variables
    let localStream = null;
    let peer = null;
    let partnerId = null;
    let mySocketId = null;
    let isConnected = false;
    let isMatched = false;
    let socket = null;
    let audioMuted = false;
    let guestTimerInterval = null;

    // ============================================
    // CHECK AUTHENTICATION
    // ============================================
    if (!token) {
      alert('Please login first');
      window.location.href = './index.html';
    }

    // ============================================
    // SOCKET CONNECTION
    // ============================================
    function initSocket() {
      socket = io(BACKEND_URL, {
        transports: ['websocket', 'polling'],
        auth: { token: token },
        reconnection: true
      });

      socket.on('connect', () => {
        mySocketId = socket.id;
        isConnected = true;
        console.log('✅ Connected to backend');
        updateStatus('Connected! Finding match...');
        startCamera();
      });

      socket.on('connect_error', (error) => {
        console.error('Connection error:', error);
        updateStatus('Connection failed. Check backend.');
        hideLoading();
      });

      socket.on('matched', async (id) => {
        partnerId = id;
        isMatched = true;
        console.log('🎯 Matched with', id);
        updateStatus('🎉 Connected! Video call active');
        hideLoading();

        document.getElementById('localVideoWrapper').classList.remove('local-fullscreen');
        document.getElementById('localVideoWrapper').classList.add('local-video');
        document.getElementById('partnerVideoWrapper').classList.remove('partner-hidden');

        const isInitiator = mySocketId < partnerId;
        createPeer(isInitiator);
      });

      socket.on('offer', async (data) => {
        partnerId = data.from;
        isMatched = true;
        console.log('📥 Received offer');
        updateStatus('📞 Connecting...');
        hideLoading();

        document.getElementById('localVideoWrapper').classList.remove('local-fullscreen');
        document.getElementById('localVideoWrapper').classList.add('local-video');
        document.getElementById('partnerVideoWrapper').classList.remove('partner-hidden');

        createPeer(false);

        try {
          await peer.setRemoteDescription(data.offer);
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          socket.emit("answer", { to: partnerId, answer });
        } catch (err) {
          console.error('Offer error:', err);
        }
      });

      socket.on('answer', async (data) => {
        if (peer) {
          await peer.setRemoteDescription(data.answer);
          console.log('✅ Answer received');
        }
      });

      socket.on('ice-candidate', async (data) => {
        if (peer) {
          await peer.addIceCandidate(data.candidate);
          console.log('❄️ ICE candidate added');
        }
      });

      socket.on('partner-disconnected', () => {
        console.log('Partner disconnected');
        updateStatus('💔 Partner left. Finding new partner...');
        cleanup();
        resetToWaiting();
      });

      socket.on('partner-left-waiting', () => {
        console.log('Partner left, waiting for new partner');
        updateStatus('👋 Partner left. Finding someone new...');
        cleanup();
        resetToWaiting();
      });
    }

    // ============================================
    // CAMERA & PEER
    // ============================================
    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        document.getElementById('localVideo').srcObject = localStream;

        // Join queue
        showLoading('Finding your match...');
        updateStatus('Looking for ' + selectedTopic + ' partners...');

        socket.emit("joinQueue", {
          interests: [selectedTopic],
          userId: localStorage.getItem('userId'),
          isGuest: isGuest
        });

        // ONLY start guest timer if user is actually a guest
        if (isGuest === true) {
          startGuestTimer();
          document.getElementById('timer').classList.remove('hidden');
        } else {
          console.log('Auth user - no timer displayed');
          document.getElementById('timer').classList.add('hidden');
        }

      } catch (err) {
        console.error('Camera error:', err);
        alert('Camera/Microphone access required');
        window.location.href = './topics.html';
      }
    }

    function createPeer(isInitiator) {
      if (peer) {
        peer.close();
        peer = null;
      }

      const configuration = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }
        ]
      };

      peer = new RTCPeerConnection(configuration);

      peer.oniceconnectionstatechange = () => {
        if (peer.iceConnectionState === 'connected') {
          updateStatus('🎬 Connected!');
          hideLoading();
        }
      };

      peer.onicecandidate = (event) => {
        if (event.candidate && partnerId) {
          socket.emit("ice-candidate", { to: partnerId, candidate: event.candidate });
        }
      };

      peer.ontrack = (event) => {
        document.getElementById("remoteVideo").srcObject = event.streams[0];
      };

      if (localStream) {
        localStream.getTracks().forEach(track => {
          peer.addTrack(track, localStream);
        });
      }

      if (isInitiator) {
        peer.createOffer()
          .then(offer => peer.setLocalDescription(offer))
          .then(() => {
            socket.emit("offer", { to: partnerId, offer: peer.localDescription });
          })
          .catch(err => console.error("Offer error:", err));
      }
    }

    // ============================================
    // QUEUE CONTROLS
    // ============================================
    function cancelQueue() {
      console.log('Cancelling queue...');
      if (socket && socket.connected) {
        socket.emit("next");
      }
      window.location.href = './topics.html';
    }

    function resetToWaiting() {
      if (socket && socket.connected) {
        showLoading('Finding new partner...');
        updateStatus('Searching...');
        socket.emit("joinQueue", {
          interests: [selectedTopic],
          userId: localStorage.getItem('userId'),
          isGuest: isGuest
        });
      }
    }

    // ============================================
    // UI CONTROLS
    // ============================================
    function updateStatus(message) {
      const statusDiv = document.getElementById('statusIndicator');
      statusDiv.textContent = message;
    }

    function showLoading(text) {
      const overlay = document.getElementById('loadingOverlay');
      const textEl = document.getElementById('loadingText');
      textEl.textContent = text;
      overlay.classList.remove('hidden');
    }

    function hideLoading() {
      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('hidden');
    }

    function toggleAudio() {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          const btn = document.getElementById('muteBtn');
          btn.textContent = audioTrack.enabled ? '🎤' : '🔇';
        }
      }
    }

    function nextUser() {
      if (confirm('Find a new partner?')) {
        socket.emit("next");
        cleanup();
        resetToWaiting();
      }
    }

    function endCall() {
      if (confirm('End video call?')) {
        socket.emit("next");
        cleanup();
        window.location.href = './topics.html';
      }
    }

    function cleanup() {
      if (peer) {
        peer.close();
        peer = null;
      }
      partnerId = null;
      isMatched = false;
    }

    // ============================================
    // GUEST TIMER
    // ============================================
    function startGuestTimer() {
      // Only start timer if user is GUEST
      if (!isGuest) {
        console.log('Auth user - no timer needed');
        return;
      }

      console.log('Guest user - starting 10 min timer');
      let timeLeft = 300; // 5 minutes

      guestTimerInterval = setInterval(async () => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;

        const timerEl = document.getElementById('timer');
        timerEl.textContent = `⏱️ Guest: ${minutes}:${seconds.toString().padStart(2, '0')}`;
        timerEl.classList.remove('hidden');

        if (timeLeft <= 60) {
          timerEl.classList.add('warning');
        }

        if (timeLeft <= 0) {
          clearInterval(guestTimerInterval);
          alert('Guest session expired. Please sign up to continue!');
          window.location.href = './index.html';
        }
      }, 1000);
    }

    // ============================================
    // INIT
    // ============================================
    function init() {
      initSocket();
    }

    init();
  </script>
</body>

</html>
