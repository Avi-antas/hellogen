<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Video Chat - Gaming Topic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.85);
            position: relative;
        }

        .video-container {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            position: relative;
        }

        .video-wrapper {
            flex: 1;
            min-width: 300px;
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 10;
        }

        .controls {
            padding: 20px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }

        /* RED FLAG BUTTON */
        .red-flag-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 32px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(220,53,69,0.4);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            display: none;
        }

        .red-flag-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(220,53,69,0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .modal-content textarea {
            height: 100px;
            resize: vertical;
        }

        .violation-list {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 12px;
            font-family: monospace;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 120px;
            right: 30px;
            background: #ff9800;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1500;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .offense-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(220,53,69,0.9);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="status" id="status">🔌 Connecting...</div>
        
        <div class="video-container">
            <div class="video-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You (Guest)</div>
                <div id="localOffenseBadge" class="offense-badge" style="display:none;"></div>
            </div>
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Partner</div>
                <div id="remoteOffenseBadge" class="offense-badge" style="display:none;"></div>
            </div>
        </div>

        <div class="controls">
            <button id="muteBtn" class="btn-primary">🔊 Mute</button>
            <button id="videoBtn" class="btn-primary">📹 Stop Video</button>
            <button id="disconnectBtn" class="btn-danger">🚪 Disconnect</button>
        </div>
    </div>

    <!-- RED FLAG BUTTON -->
    <button id="redFlagBtn" class="red-flag-btn">🚩</button>

    <!-- REPORT MODAL -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h3>🚨 Report Violation</h3>
            <div id="violationsList" class="violation-list"></div>
            <select id="violationType">
                <option value="harassment">Harassment / Bullying</option>
                <option value="inappropriate">Inappropriate Content</option>
                <option value="hate_speech">Hate Speech</option>
                <option value="spam">Spam / Scam</option>
                <option value="other">Other</option>
            </select>
            <textarea id="violationDesc" placeholder="Describe what happened..."></textarea>
            <div class="modal-buttons">
                <button id="submitReportBtn" style="background:#28a745; color:white;">✅ Submit Report</button>
                <button id="closeModalBtn" style="background:#6c757d; color:white;">❌ Cancel</button>
            </div>
        </div>
    </div>

    <!-- Socket.IO Client -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            socketUrl: 'https://hellogen.onrender.com',
            peerConfig: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            },
            moderation: {
                gestureEnabled: true,
                audioEnabled: true
            }
        };

        // ==================== GLOBAL VARIABLES ====================
        let socket = null;
        let localStream = null;
        let peerConnection = null;
        let currentRoom = null;
        let isGuest = true;
        let guestId = localStorage.getItem('guest_id') || 'guest_' + Math.random().toString(36).substr(2, 9);
        let currentTopic = 'gaming';
        let partnerLeft = false;
        
        // Moderation variables
        let hands = null;
        let camera = null;
        let gestureMonitoring = false;
        let audioContext = null;
        let audioMonitoring = false;
        
        // Offense tracking
        let offenseCount = 0;
        let currentViolations = [];
        let redFlagShown = false;
        let autoDisconnectEnabled = false; // DISABLED - we show red flag instead
        
        // Timer for guest
        let guestTimer = null;
        let guestTimeLeft = 300; // 5 minutes in seconds

        // DOM Elements
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusDiv = document.getElementById('status');
        const redFlagBtn = document.getElementById('redFlagBtn');
        const reportModal = document.getElementById('reportModal');
        const violationsListDiv = document.getElementById('violationsList');
        const violationType = document.getElementById('violationType');
        const violationDesc = document.getElementById('violationDesc');
        const submitReportBtn = document.getElementById('submitReportBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const muteBtn = document.getElementById('muteBtn');
        const videoBtn = document.getElementById('videoBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        // ==================== HELPER FUNCTIONS ====================
        function updateStatus(message, isError = false) {
            statusDiv.textContent = message;
            statusDiv.style.color = isError ? '#dc3545' : '#4ade80';
            console.log(`📡 Status: ${message}`);
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.background = isError ? '#dc3545' : '#ff9800';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showOffenseBadge(elementId, message) {
            const badge = document.getElementById(elementId);
            badge.textContent = `⚠️ ${message}`;
            badge.style.display = 'block';
            setTimeout(() => {
                badge.style.display = 'none';
            }, 5000);
        }

        // ==================== OFFENSE HANDLER (NO AUTO-DISCONNECT) ====================
        function handleOffense(detection) {
            offenseCount++;
            const offenseData = {
                id: Date.now(),
                type: detection.type || 'unknown',
                message: detection.message || 'Violation detected',
                confidence: detection.confidence || 0.8,
                timestamp: new Date().toISOString(),
                topic: currentTopic
            };
            
            currentViolations.push(offenseData);
            
            // Log to console (visible in your dev tools)
            console.log(`🚨 OFFENSE #${offenseCount}:`, {
                type: offenseData.type,
                message: offenseData.message,
                confidence: offenseData.confidence,
                timestamp: offenseData.timestamp
            });
            
            // Show badge on video
            showOffenseBadge('localOffenseBadge', offenseData.message);
            
            // Show toast notification
            showToast(`⚠️ Violation detected: ${offenseData.message}`, false);
            
            // SHOW RED FLAG BUTTON (instead of auto-disconnecting)
            if (!redFlagShown) {
                redFlagBtn.style.display = 'flex';
                redFlagShown = true;
                console.log('🔴 Red flag button shown - User can now report');
                showToast('🚩 Red flag button available - Click to report violation', false);
            } else {
                // If button already showing, just update
                console.log(`🔴 Additional offense recorded. Total: ${offenseCount}`);
            }
            
            // Optional: Highlight red flag button
            redFlagBtn.style.animation = 'pulse 0.5s ease';
            setTimeout(() => {
                redFlagBtn.style.animation = 'pulse 2s infinite';
            }, 500);
            
            // If you have a backend endpoint, send real-time alert
            if (CONFIG.moderationEndpoint) {
                sendRealtimeAlert(offenseData);
            }
        }

        async function sendRealtimeAlert(offenseData) {
            try {
                const response = await fetch(`${CONFIG.socketUrl}/moderation/alert`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        guestId: guestId,
                        offense: offenseData,
                        topic: currentTopic
                    })
                });
                if (response.ok) {
                    console.log('📤 Real-time alert sent to server');
                }
            } catch (error) {
                console.warn('⚠️ Failed to send real-time alert:', error);
            }
        }

        // ==================== REPORT SUBMISSION ====================
        async function submitReport() {
            if (currentViolations.length === 0) {
                showToast('No violations detected to report', true);
                return;
            }
            
            const reportData = {
                reportId: Date.now(),
                guestId: guestId,
                topic: currentTopic,
                violations: currentViolations,
                violationType: violationType.value,
                description: violationDesc.value,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                platform: navigator.platform
            };
            
            // Get IP address (for guest tracking)
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                reportData.guestIp = ipData.ip;
            } catch (error) {
                console.warn('Could not fetch IP:', error);
                reportData.guestIp = 'unknown';
            }
            
            console.log('📤 Submitting report:', reportData);
            
            try {
                // Try to send to backend
                const response = await fetch(`${CONFIG.socketUrl}/moderation/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reportData)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('✅ Report submitted successfully:', result);
                    showToast('✅ Report submitted! Thank you for helping keep the community safe.', false);
                    
                    // Close modal and hide red flag
                    reportModal.style.display = 'none';
                    redFlagBtn.style.display = 'none';
                    redFlagShown = false;
                    
                    // Clear violations after report
                    currentViolations = [];
                    offenseCount = 0;
                    violationDesc.value = '';
                    
                    // Optional: Send email if user (but we're guest)
                    if (!isGuest) {
                        await sendViolationEmail(reportData);
                    }
                } else {
                    throw new Error('Server returned ' + response.status);
                }
            } catch (error) {
                console.error('❌ Report submission failed:', error);
                showToast('❌ Failed to submit report. Please try again.', true);
                
                // Fallback: Save locally
                saveReportLocally(reportData);
            }
        }
        
        function saveReportLocally(reportData) {
            const reports = JSON.parse(localStorage.getItem('local_reports') || '[]');
            reports.push(reportData);
            localStorage.setItem('local_reports', JSON.stringify(reports));
            console.log('💾 Report saved locally (offline mode)');
            showToast('📱 Report saved locally. Will sync when online.', false);
            reportModal.style.display = 'none';
            redFlagBtn.style.display = 'none';
            redFlagShown = false;
        }
        
        async function sendViolationEmail(reportData) {
            // This would send email to user about their report
            console.log('📧 Would send email to user about report:', reportData.reportId);
        }

        // ==================== GESTURE MODERATION (MediaPipe) ====================
        async function startGestureMonitoring() {
            console.log('🎯 Starting gesture monitoring...');
            
            const remoteVideoElement = document.getElementById('remoteVideo');
            if (!remoteVideoElement || !remoteVideoElement.srcObject) {
                console.warn('⚠️ Remote video not ready, retrying in 1s');
                setTimeout(startGestureMonitoring, 1000);
                return;
            }
            
            try {
                hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });
                
                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                hands.onResults((results) => {
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        // Detect offensive gestures
                        results.multiHandLandmarks.forEach((landmarks, index) => {
                            const gesture = detectOffensiveGesture(landmarks);
                            if (gesture.isOffensive) {
                                handleOffense({
                                    type: 'gesture',
                                    message: gesture.message,
                                    confidence: gesture.confidence
                                });
                            }
                        });
                    }
                });
                
                // Create camera from remote video
                const remoteTrack = remoteVideoElement.srcObject.getVideoTracks()[0];
                if (remoteTrack) {
                    const imageCapture = new ImageCapture(remoteTrack);
                    console.log('✅ Gesture monitoring active on remote video');
                    gestureMonitoring = true;
                    
                    // Process frames
                    async function processFrame() {
                        if (!gestureMonitoring) return;
                        try {
                            const frame = await imageCapture.grabFrame();
                            await hands.send({ image: frame });
                            requestAnimationFrame(processFrame);
                        } catch (error) {
                            // Silently fail and retry
                            setTimeout(processFrame, 100);
                        }
                    }
                    processFrame();
                }
            } catch (error) {
                console.error('❌ Failed to start gesture monitoring:', error);
            }
        }
        
        function detectOffensiveGesture(landmarks) {
            // Simple offensive gesture detection
            // Middle finger detection (flipping off)
            const middleFingerTip = landmarks[12];
            const indexFingerTip = landmarks[8];
            const ringFingerTip = landmarks[16];
            
            // Check if middle finger is extended while others are curled
            const middleExtended = middleFingerTip.y < landmarks[10].y;
            const indexCurled = indexFingerTip.y > landmarks[6].y;
            const ringCurled = ringFingerTip.y > landmarks[14].y;
            
            if (middleExtended && indexCurled && ringCurled) {
                return {
                    isOffensive: true,
                    message: 'Offensive hand gesture detected (middle finger)',
                    confidence: 0.85
                };
            }
            
            // Thumbs up is fine, no offense
            return { isOffensive: false };
        }
        
        function stopGestureMonitoring() {
            gestureMonitoring = false;
            if (hands) {
                hands.close();
                hands = null;
            }
            console.log('🛑 Gesture monitoring stopped');
        }

        // ==================== AUDIO MODERATION ====================
        async function startAudioMonitoring() {
            console.log('🎤 Starting audio monitoring...');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn('⚠️ Audio monitoring not supported');
                return;
            }
            
            try {
                // Get audio stream from remote
                const remoteVideoElement = document.getElementById('remoteVideo');
                if (!remoteVideoElement || !remoteVideoElement.srcObject) {
                    setTimeout(startAudioMonitoring, 1000);
                    return;
                }
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(remoteVideoElement.srcObject);
                const analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                function analyzeAudio() {
                    if (!audioMonitoring) return;
                    analyser.getByteFrequencyData(dataArray);
                    
                    // Detect loud screaming/shouting
                    let maxVolume = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        maxVolume = Math.max(maxVolume, dataArray[i]);
                    }
                    
                    // Threshold for offensive loudness
                    if (maxVolume > 200) {
                        handleOffense({
                            type: 'audio',
                            message: 'Excessive loud volume detected (possible screaming)',
                            confidence: Math.min(maxVolume / 255, 0.95)
                        });
                    }
                    
                    requestAnimationFrame(analyzeAudio);
                }
                
                analyzeAudio();
                audioMonitoring = true;
                console.log('✅ Audio monitoring active');
            } catch (error) {
                console.error('❌ Audio monitoring failed:', error);
            }
        }
        
        function stopAudioMonitoring() {
            audioMonitoring = false;
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            console.log('🛑 Audio monitoring stopped');
        }

        // ==================== AI MODERATION INIT ====================
        function startAIModeration() {
            console.log('🎯 AI Moderation Active - Auto-disconnect DISABLED');
            console.log('🔴 Offenses will show RED FLAG button instead of disconnecting');
            
            if (CONFIG.moderation.gestureEnabled) {
                setTimeout(startGestureMonitoring, 2000);
            }
            
            if (CONFIG.moderation.audioEnabled) {
                setTimeout(startAudioMonitoring, 3000);
            }
        }
        
        function stopAIModeration() {
            stopGestureMonitoring();
            stopAudioMonitoring();
            console.log('🛑 AI Moderation stopped');
        }

        // ==================== GUEST TIMER ====================
        function startGuestTimer() {
            console.log('👤 Guest user - starting 5 min timer');
            guestTimer = setInterval(() => {
                if (guestTimeLeft <= 0) {
                    clearInterval(guestTimer);
                    showToast('⏰ 5 minutes completed! Thanks for using the platform.', false);
                    // Optionally disconnect after time
                    // disconnect();
                } else {
                    guestTimeLeft--;
                    if (guestTimeLeft % 60 === 0 && guestTimeLeft > 0) {
                        console.log(`⏰ Guest timer: ${Math.floor(guestTimeLeft / 60)}m ${guestTimeLeft % 60}s remaining`);
                    }
                }
            }, 1000);
        }

        // ==================== WEBRTC ====================
        async function initLocalStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localVideo.srcObject = localStream;
                console.log('✅ Local stream acquired');
                return true;
            } catch (error) {
                console.error('❌ Failed to get local stream:', error);
                updateStatus('Camera/Mic access denied', true);
                return false;
            }
        }
        
        function initSocket() {
            socket = io(CONFIG.socketUrl, {
                transports: ['websocket'],
                reconnection: true
            });
            
            socket.on('connect', () => {
                console.log('✅ Connected to backend');
                updateStatus('Connected');
                socket.emit('guest-join', { topic: currentTopic, guestId: guestId });
            });
            
            socket.on('matched', async (data) => {
                console.log(`🎯 Matched with ${data.partnerId} Topic: ${data.topic}`);
                currentRoom = data.roomId;
                updateStatus(`Matched - Topic: ${data.topic}`);
                await createPeerConnection();
                startAIModeration();
            });
            
            socket.on('signal', async (signal) => {
                if (!peerConnection) return;
                
                if (signal.sdp) {
                    console.log('📥 Received offer/answer');
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                    if (signal.sdp.type === 'offer') {
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        socket.emit('signal', { signal: { sdp: answer }, to: signal.from });
                    }
                } else if (signal.candidate) {
                    console.log('❄️ ICE candidate added');
                    await peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate));
                }
            });
            
            socket.on('partner-left', () => {
                console.log('Partner left, waiting for new partner');
                updateStatus('Partner disconnected - Finding new partner...');
                partnerLeft = true;
                stopAIModeration();
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                setTimeout(() => {
                    socket.emit('guest-join', { topic: currentTopic, guestId: guestId });
                }, 1000);
            });
            
            socket.on('disconnect', () => {
                console.warn('Disconnected from server');
                updateStatus('Disconnected', true);
            });
        }
        
        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(CONFIG.peerConfig);
            
            // Add local stream tracks
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            // Handle remote stream
            peerConnection.ontrack = (event) => {
                console.log('📡 Remote stream received');
                remoteVideo.srcObject = event.streams[0];
            };
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('signal', { signal: { candidate: event.candidate }, to: currentRoom });
                }
            };
            
            // Create offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('signal', { signal: { sdp: offer }, to: currentRoom });
        }
        
        function disconnect() {
            console.log('Disconnecting...');
            if (peerConnection) peerConnection.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());
            if (socket) socket.disconnect();
            stopAIModeration();
            if (guestTimer) clearInterval(guestTimer);
            updateStatus('Disconnected');
        }

        // ==================== UI EVENT HANDLERS ====================
        redFlagBtn.addEventListener('click', () => {
            console.log('🔴 Red flag button clicked by user');
            // Populate violations list in modal
            if (currentViolations.length === 0) {
                violationsListDiv.innerHTML = '<p style="color:#999;">No automatic violations detected. You can still submit a manual report.</p>';
            } else {
                violationsListDiv.innerHTML = `
                    <strong>Detected violations (${currentViolations.length}):</strong>
                    ${currentViolations.map(v => `
                        <div style="margin: 8px 0; padding: 5px; background: #fee; border-left: 3px solid #dc3545;">
                            <small>${new Date(v.timestamp).toLocaleTimeString()}</small><br>
                            <strong>${v.type}:</strong> ${v.message}
                        </div>
                    `).join('')}
                `;
            }
            reportModal.style.display = 'flex';
        });
        
        submitReportBtn.addEventListener('click', submitReport);
        
        closeModalBtn.addEventListener('click', () => {
            reportModal.style.display = 'none';
        });
        
        muteBtn.addEventListener('click', () => {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    muteBtn.textContent = audioTrack.enabled ? '🔊 Mute' : '🔇 Unmute';
                    console.log(`Microphone ${audioTrack.enabled ? 'enabled' : 'disabled'}`);
                }
            }
        });
        
        videoBtn.addEventListener('click', () => {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    videoBtn.textContent = videoTrack.enabled ? '📹 Stop Video' : '📹 Start Video';
                    console.log(`Camera ${videoTrack.enabled ? 'enabled' : 'disabled'}`);
                }
            }
        });
        
        disconnectBtn.addEventListener('click', () => {
            if (confirm('Disconnect from current chat?')) {
                disconnect();
                location.reload();
            }
        });
        
        // Close modal on outside click
        window.addEventListener('click', (e) => {
            if (e.target === reportModal) {
                reportModal.style.display = 'none';
            }
        });

        // ==================== INITIALIZATION ====================
        localStorage.setItem('guest_id', guestId);
        console.log(`👤 Guest ID: ${guestId}`);
        console.log(`📌 Topic: ${currentTopic}`);
        console.log(`🔴 Auto-disconnect on offense: DISABLED (showing red flag button instead)`);
        
        (async () => {
            const streamReady = await initLocalStream();
            if (streamReady) {
                initSocket();
                startGuestTimer();
            }
        })();
    </script>
</body>
</html>
