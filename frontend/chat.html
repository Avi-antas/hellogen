<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Live Chat - Hellogen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .video-wrapper {
      position: absolute;
      transition: all 0.5s;
      background: #000;
      overflow: hidden;
    }

    .video-wrapper.partner-video {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .video-wrapper.local-video {
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 160px;
      z-index: 2;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .video-wrapper.local-fullscreen {
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #localVideo {
      transform: rotateY(180deg);
    }

    .controls {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      margin: 0 20px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s;
    }

    .control-btn.next {
      background: #ff4757;
      color: white;
    }

    .control-btn.end {
      background: #ff0000;
      color: white;
    }

    .control-btn.mute {
      background: #2ed573;
      color: white;
    }

    .control-btn.cancel {
      background: #ffa502;
      color: white;
    }

    .status-indicator {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 25px;
      color: white;
      font-size: 14px;
      z-index: 15;
      white-space: nowrap;
    }

    .searching-topic-inline {
      margin: 15px 0 10px 0;
      padding: 10px 15px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 25px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .searching-topic-inline strong {
      color: #667eea;
      font-size: 16px;
      background: rgba(102, 126, 234, 0.2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .loading-content {
      text-align: center;
      color: white;
      min-width: 280px;
    }

    .timer {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 8px 15px;
      border-radius: 20px;
      color: white;
      font-size: 14px;
      font-family: monospace;
      z-index: 15;
    }

    .timer.warning {
      background: #ff4757;
      animation: blink 1s infinite;
    }

    .red-flag-btn {
      position: fixed;
      bottom: 120px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #ff0000;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 24px;
      z-index: 15;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
      animation: pulse 2s infinite;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .red-flag-btn.visible {
      display: flex;
    }

    .moderation-warning {
      position: fixed;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      z-index: 1000;
      animation: slideUp 0.3s ease;
      font-weight: bold;
      white-space: nowrap;
    }

    @keyframes blink {
      50% {
        opacity: 0.5;
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
      }

      70% {
        transform: scale(1.1);
        box-shadow: 0 0 0 10px rgba(255, 0, 0, 0);
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-content {
      text-align: center;
      color: white;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    .cancel-queue {
      margin-top: 20px;
      padding: 10px 20px;
      background: #ff4757;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .control-btn {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }

      .local-video {
        width: 100px;
        height: 133px;
      }

      .moderation-warning {
        font-size: 11px;
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }
  </style>
</head>

<body>
  <div class="video-container">
    <div class="video-wrapper partner-video" id="partnerVideoWrapper">
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="video-wrapper local-fullscreen" id="localVideoWrapper">
      <video id="localVideo" autoplay muted playsinline></video>
    </div>
  </div>



  <div class="controls" id="controls">
    <button class="control-btn mute" id="muteBtn" onclick="toggleAudio()">🎤</button>
    <button class="control-btn next" onclick="nextUser()">⏭️</button>
    <button class="control-btn end" onclick="endCall()">📞</button>
  </div>

  <button class="red-flag-btn" id="redFlagBtn" onclick="reportViolation()">🚩</button>

  <div class="status-indicator" id="statusIndicator">Connecting...</div>
  <div class="timer hidden" id="timer"></div>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <p id="loadingText">Finding your match...</p>
      <div class="searching-topic-inline" id="searchingTopicInline" style="display: none;">
        <span>Searching for</span>
        <strong id="searchingTopicNameInline">Coding</strong>
        <span>partners...</span>
      </div>
      <button class="cancel-queue" onclick="cancelQueue()">Cancel & Go Back</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

  <script>
    // ============================================
    // CONFIGURATION
    // ============================================
    const BACKEND_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:5000'
      : 'https://hellogen.onrender.com';
    const token = localStorage.getItem('token');
    const isGuest = localStorage.getItem('isGuest') === 'true';
    const selectedTopic = localStorage.getItem('selectedTopic');

    console.log('Chat started - Auth:', !isGuest, 'Guest:', isGuest, 'Topic:', selectedTopic);

    // Global variables
    let localStream = null;
    let peer = null;
    let partnerId = null;
    let mySocketId = null;
    let isConnected = false;
    let isMatched = false;
    let socket = null;
    let audioMuted = false;
    let guestTimerInterval = null;
    let violationCount = 0;
    let mediaRecorder = null;
    let audioChunks = [];
    let handsDetector = null;

    // ============================================
    // CHECK AUTHENTICATION
    // ============================================
    if (!token) {
      alert('Please login first');
      window.location.href = './index.html';
    }

    // ============================================
    // SOCKET CONNECTION
    // ============================================
    function initSocket() {
      socket = io(BACKEND_URL, {
        transports: ['websocket', 'polling'],
        auth: { token: token },
        reconnection: true
      });

      socket.on('connect', () => {
        mySocketId = socket.id;
        isConnected = true;
        console.log('✅ Connected to backend');
        updateStatus('Connected! Finding match...');
        startCamera();
      });

      socket.on('connect_error', (error) => {
        console.error('Connection error:', error);
        updateStatus('Connection failed. Check backend.');
        hideLoading();
      });

      socket.on('matched', async (id) => {
        partnerId = id;
        isMatched = true;
        console.log('🎯 Matched with', id);
        updateStatus('🎉 Connected! Video call active');
        hideLoading();

        document.getElementById('localVideoWrapper').classList.remove('local-fullscreen');
        document.getElementById('localVideoWrapper').classList.add('local-video');
        document.getElementById('partnerVideoWrapper').classList.remove('partner-hidden');

        const isInitiator = mySocketId < partnerId;
        createPeer(isInitiator);

        // Start AI Moderation after match
        startAIModeration();
      });

      socket.on('matched', async (id, topic) => {
        partnerId = id;
        isMatched = true;
        partnerStartTime = Date.now();

        // Hide loading and searching display
        hideLoading();

        // Show matched topic badge
        const topicBadge = document.getElementById('topicBadge');
        const matchedTopicSpan = document.getElementById('matchedTopic');
        matchedTopicSpan.textContent = topic || selectedTopic;
        topicBadge.style.display = 'flex';

        updateStatus('🎉 Connected! Video call active');

        partnerId = data.from;
        isMatched = true;
        console.log('📥 Received offer');
        updateStatus('📞 Connecting...');
        hideLoading();

        document.getElementById('localVideoWrapper').classList.remove('local-fullscreen');
        document.getElementById('localVideoWrapper').classList.add('local-video');
        document.getElementById('partnerVideoWrapper').classList.remove('partner-hidden');

        createPeer(false);

        try {
          await peer.setRemoteDescription(data.offer);
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          socket.emit("answer", { to: partnerId, answer });
        } catch (err) {
          console.error('Offer error:', err);
        }
      });

      socket.on('answer', async (data) => {
        if (peer) {
          await peer.setRemoteDescription(data.answer);
          console.log('✅ Answer received');
        }
      });

      socket.on('ice-candidate', async (data) => {
        if (peer) {
          await peer.addIceCandidate(data.candidate);
          console.log('❄️ ICE candidate added');
        }
      });

      socket.on('partner-disconnected', () => {
        console.log('Partner disconnected');
        updateStatus('💔 Partner left. Finding new partner...');
        stopAIModeration();
        cleanup();
        resetToWaiting();
      });

      socket.on('partner-left-waiting', () => {
        console.log('Partner left, waiting for new partner');
        updateStatus('👋 Partner left. Finding someone new...');
        stopAIModeration();
        cleanup();
        resetToWaiting();
      });

      socket.on('show-red-flag', (data) => {
        console.log('🚩 Red flag received:', data);
        showRedFlag(data.reason || 'Policy violation detected', data.severity || 3);
      });

      socket.on('call-ended-violation', (data) => {
        updateStatus(data.message || 'Call ended due to policy violation');
        showModerationWarning(data.message || 'Call ended due to policy violation', '#ff0000');
        setTimeout(() => {
          window.location.href = './topics.html';
        }, 3000);
      });
    }

    // ============================================
    // AI MODERATION SYSTEM
    // ============================================

    // Audio Moderation (Whisper + ToxicBERT)
    async function startAudioMonitoring() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
          audioChunks = [];
          await analyzeAudioChunk(audioBlob);
        };

        mediaRecorder.start(4000);
        console.log('✅ Audio monitoring active');

      } catch (err) {
        console.error('Audio monitoring failed:', err);
      }
    }

    async function analyzeAudioChunk(audioBlob) {
      const formData = new FormData();
      formData.append('audio', audioBlob);

      try {
        const response = await fetch(`${BACKEND_URL}/moderation/audio`, {
          method: 'POST',
          body: formData
        });

        const result = await response.json();

        if (result.isInappropriate && result.confidence > 0.6) {
          handleViolation({
            type: 'audio_slang',
            detected: result.detected || [],
            transcript: result.transcript,
            severity: result.severity || 3,
            confidence: result.confidence
          });
        }
      } catch (err) {
        console.error('Analysis failed:', err);
      }
    }

    // Gesture Moderation (MediaPipe Hands)
    async function startGestureMonitoring() {
      const videoElement = document.getElementById('remoteVideo');
      if (!videoElement) return;

      handsDetector = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });

      handsDetector.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      handsDetector.onResults((results) => {
        if (results.multiHandLandmarks) {
          for (const landmarks of results.multiHandLandmarks) {
            const gesture = classifyGesture(landmarks);
            if (gesture.isOffensive && gesture.confidence > 0.7) {
              handleViolation({
                type: 'offensive_gesture',
                gesture: gesture.name,
                severity: 4,
                confidence: gesture.confidence
              });
            }
          }
        }
      });

      // Process video frames
      const processVideo = async () => {
        if (videoElement && videoElement.readyState >= 2 && handsDetector) {
          await handsDetector.send({ image: videoElement });
        }
        requestAnimationFrame(processVideo);
      };

      processVideo();
      console.log('✅ Gesture monitoring active');
    }

    function classifyGesture(landmarks) {
      // Get finger tip and joint positions
      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const middleTip = landmarks[12];
      const ringTip = landmarks[16];
      const pinkyTip = landmarks[20];

      const indexDip = landmarks[6];  // Middle joint
      const middleDip = landmarks[10];
      const ringDip = landmarks[14];
      const pinkyDip = landmarks[18];

      const indexMcp = landmarks[5];  // Base joint
      const middleMcp = landmarks[9];
      const ringMcp = landmarks[13];
      const pinkyMcp = landmarks[17];

      // Calculate finger extension (how straight each finger is)
      const indexExtension = indexTip.y < indexDip.y;
      const middleExtension = middleTip.y < middleDip.y;
      const ringExtension = ringTip.y < ringDip.y;
      const pinkyExtension = pinkyTip.y < pinkyDip.y;

      // MIDDLE FINGER DETECTION - ONLY when other fingers are DOWN
      const isMiddleOnlyUp = middleExtension &&
        !indexExtension &&
        !ringExtension &&
        !pinkyExtension;

      // Also check finger separation (middle finger significantly higher than index)
      const middleVsIndex = (middleDip.y - indexDip.y) > 0.05;
      const middleVsRing = (middleDip.y - ringDip.y) > 0.05;

      const isMiddleFinger = isMiddleOnlyUp && (middleVsIndex || middleVsRing);

      if (isMiddleFinger) {
        return { isOffensive: true, name: 'middle_finger', confidence: 0.95 };
      }

      // FIST DETECTION - ALL fingers curled DOWN
      const allFingersCurled = !indexExtension &&
        !middleExtension &&
        !ringExtension &&
        !pinkyExtension;

      // Also check if fingertips are below base joints
      const fingersBelowBase = indexTip.y > indexMcp.y &&
        middleTip.y > middleMcp.y &&
        ringTip.y > ringMcp.y &&
        pinkyTip.y > pinkyMcp.y;

      const isFist = allFingersCurled && fingersBelowBase;

      if (isFist) {
        return { isOffensive: true, name: 'fist', confidence: 0.7 };
      }

      // POINTING FINGER - Index extended, others curled
      const isPointing = indexExtension &&
        !middleExtension &&
        !ringExtension &&
        !pinkyExtension;

      // Check if hand is pointing AT the camera (aggressive)
      const handPosition = landmarks[0]; // Wrist position
      const isPointingAtCamera = isPointing &&
        (indexTip.z - handPosition.z) > 0.02;

      if (isPointingAtCamera) {
        return { isOffensive: true, name: 'pointing', confidence: 0.7 };
      }

      // Peace sign (V sign) - NOT offensive
      const isPeaceSign = indexExtension && middleExtension &&
        !ringExtension && !pinkyExtension;

      if (isPeaceSign) {
        return { isOffensive: false, name: 'peace', confidence: 0 };
      }

      // Normal wave - NOT offensive
      const isWave = indexExtension && middleExtension &&
        ringExtension && pinkyExtension;

      if (isWave) {
        return { isOffensive: false, name: 'wave', confidence: 0 };
      }

      return { isOffensive: false, name: 'normal', confidence: 0 };
    }

    let lastViolationTime = 0;
    const VIOLATION_COOLDOWN = 2000; // 2 seconds between violations

    function handleViolation(violation) {
      const now = Date.now();

      // Prevent multiple violations in quick succession
      if (now - lastViolationTime < VIOLATION_COOLDOWN) {
        console.log('Violation cooldown, ignoring...');
        return;
      }
      lastViolationTime = now;

      console.log('🚨 VIOLATION DETECTED:', violation);

      violationCount++;

      let action = 'warn';
      let severity = violation.severity || 3;

      if (severity >= 4 || violationCount >= 3) {
        action = 'end_call';
      } else if (severity >= 3 || violationCount >= 2) {
        action = 'red_flag';
      }

      // Send to backend
      socket.emit('moderation-violation', {
        to: partnerId,
        type: violation.type,
        details: violation,
        action: action,
        violationCount: violationCount
      });

      // Show warning
      let message = '';
      let color = '#ffa502';

      if (violation.type === 'audio_slang') {
        message = `⚠️ Inappropriate language detected: ${violation.detected[0]?.word || 'abusive words'}`;
        color = '#ffa502';
      } else if (violation.type === 'offensive_gesture') {
        message = `🚫 Offensive gesture detected: ${violation.gesture}`;
        color = '#ff4757';
      }

      if (action === 'end_call') {
        message = `❗ SEVERE: ${message} Call will end`;
        color = '#ff0000';
      }

      showModerationWarning(message, color);

      if (action === 'end_call') {
        setTimeout(() => {
          socket.emit("next");
          window.location.href = './topics.html';
        }, 3000);
      }
    }

    function showModerationWarning(message, color) {
      const warningDiv = document.createElement('div');
      warningDiv.className = 'moderation-warning';
      warningDiv.style.background = color;
      warningDiv.style.color = 'white';
      warningDiv.textContent = message;
      document.body.appendChild(warningDiv);
      setTimeout(() => warningDiv.remove(), 4000);
    }

    function showRedFlag(reason, severity) {
      const redFlagBtn = document.getElementById('redFlagBtn');
      redFlagBtn.classList.add('visible');
      redFlagBtn.title = reason;

      if (severity >= 4) {
        redFlagBtn.style.animation = 'pulse 0.5s infinite';
      }

      // Auto-hide after 10 seconds
      setTimeout(() => {
        redFlagBtn.classList.remove('visible');
      }, 10000);
    }

    function reportViolation() {
      if (!partnerId) return;

      if (confirm('Report this user for policy violation?')) {
        socket.emit('report-violation', {
          reportedUserId: partnerId,
          reason: 'ai_detected_violation',
          severity: 'high'
        });
        showModerationWarning('✅ Report submitted. Thank you for keeping our community safe.', '#2ed573');
        document.getElementById('redFlagBtn').classList.remove('visible');
      }
    }

    function startAIModeration() {
      startAudioMonitoring();
      startGestureMonitoring();
      console.log('🎯 AI Moderation Active');
    }

    function stopAIModeration() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      if (handsDetector) {
        handsDetector.close();
        handsDetector = null;
      }
    }

    // ============================================
    // CAMERA & PEER
    // ============================================
    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        document.getElementById('localVideo').srcObject = localStream;

        showLoading('Finding your match...');
        updateStatus('Looking for ' + selectedTopic + ' partners...');

        socket.emit("joinQueue", {
          interests: [selectedTopic],
          userId: localStorage.getItem('userId'),
          isGuest: isGuest
        });

        if (isGuest === true) {
          startGuestTimer();
          document.getElementById('timer').classList.remove('hidden');
        }
      } catch (err) {
        console.error('Camera error:', err);
        alert('Camera/Microphone access required');
        window.location.href = './topics.html';
      }
    }

    function createPeer(isInitiator) {
      if (peer) {
        peer.close();
        peer = null;
      }

      const configuration = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          { urls: "stun:stun1.l.google.com:19302" },
          { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" }
        ]
      };

      peer = new RTCPeerConnection(configuration);

      peer.oniceconnectionstatechange = () => {
        if (peer.iceConnectionState === 'connected') {
          updateStatus('🎬 Connected!');
          hideLoading();
        }
      };

      peer.onicecandidate = (event) => {
        if (event.candidate && partnerId) {
          socket.emit("ice-candidate", { to: partnerId, candidate: event.candidate });
        }
      };

      peer.ontrack = (event) => {
        document.getElementById("remoteVideo").srcObject = event.streams[0];
      };

      if (localStream) {
        localStream.getTracks().forEach(track => {
          peer.addTrack(track, localStream);
        });
      }

      if (isInitiator) {
        peer.createOffer()
          .then(offer => peer.setLocalDescription(offer))
          .then(() => {
            socket.emit("offer", { to: partnerId, offer: peer.localDescription });
          })
          .catch(err => console.error("Offer error:", err));
      }
    }

    // ============================================
    // QUEUE CONTROLS
    // ============================================
    function cancelQueue() {
      console.log('Cancelling queue...');
      hideLoading(); // This will also hide the searching topic
      if (socket && socket.connected) {
        socket.emit("next");
      }
      window.location.href = './topics.html';
    }

    function resetToWaiting() {
      if (socket && socket.connected) {
        showLoading('Finding new partner...');
        updateStatus('Searching...');
        socket.emit("joinQueue", {
          interests: [selectedTopic],
          userId: localStorage.getItem('userId'),
          isGuest: isGuest
        });
      }
    }

    // ============================================
    // UI CONTROLS
    // ============================================
    function updateStatus(message) {
      const statusDiv = document.getElementById('statusIndicator');
      statusDiv.textContent = message;
    }

    // Show searching topic in loading overlay
    function showSearchingTopic(topic) {
      const inlineDiv = document.getElementById('searchingTopicInline');
      const topicNameSpan = document.getElementById('searchingTopicNameInline');
      topicNameSpan.textContent = topic;
      inlineDiv.style.display = 'flex';
    }

    function hideSearchingTopic() {
      const inlineDiv = document.getElementById('searchingTopicInline');
      inlineDiv.style.display = 'none';
    }

    // Update showLoading function
    function showLoading(text = 'Finding your perfect match...') {
      isLoading = true;
      const overlay = document.getElementById('loadingOverlay');
      const textEl = document.getElementById('loadingText');
      textEl.textContent = text;
      overlay.classList.remove('hidden');

      // Show searching topic if we have a selected topic
      if (selectedTopic) {
        showSearchingTopic(selectedTopic);
      }
    }

    // Update hideLoading function
    function hideLoading() {
      isLoading = false;
      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('hidden');
      hideSearchingTopic(); // Hide the inline searching text
    }
    function toggleAudio() {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          const btn = document.getElementById('muteBtn');
          btn.textContent = audioTrack.enabled ? '🎤' : '🔇';
        }
      }
    }

    function nextUser() {
      if (confirm('Find a new partner?')) {
        stopAIModeration();
        socket.emit("next");
        cleanup();
        resetToWaiting();
      }
    }

    function endCall() {
      if (confirm('End video call?')) {
        stopAIModeration();
        socket.emit("next");
        cleanup();
        window.location.href = './topics.html';
      }
    }

    function cleanup() {
      if (peer) {
        peer.close();
        peer = null;
      }
      partnerId = null;
      isMatched = false;
    }

    // ============================================
    // GUEST TIMER
    // ============================================
    function startGuestTimer() {
      if (!isGuest) {
        console.log('Auth user - no timer needed');
        return;
      }

      console.log('Guest user - starting 5 min timer');
      let timeLeft = 300;

      guestTimerInterval = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;

        const timerEl = document.getElementById('timer');
        timerEl.textContent = `⏱️ Guest: ${minutes}:${seconds.toString().padStart(2, '0')}`;
        timerEl.classList.remove('hidden');

        if (timeLeft <= 60) {
          timerEl.classList.add('warning');
        }

        if (timeLeft <= 0) {
          clearInterval(guestTimerInterval);
          alert('Guest session expired. Please sign up to continue!');
          window.location.href = './index.html';
        }
      }, 1000);
    }

    // ============================================
    // INIT
    // ============================================
    function init() {
      initSocket();
    }

    init();
  </script>
</body>

</html>
